<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Carousel Project</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <style>
    .carousel-item img {
      width: 100%;
      height: 400px;
      object-fit: cover;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="text-center mb-4">🎞️ Bootstrap Carousel Project</h2>

  <!-- Carousel -->
  <div id="myCarousel" class="carousel slide" data-ride="carousel">

    <!-- Indicators -->
    <ul class="carousel-indicators">
      <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
      <li data-target="#myCarousel" data-slide-to="1"></li>
      <li data-target="#myCarousel" data-slide-to="2"></li>
    </ul>

    <!-- Slides -->
    <div class="carousel-inner">

      <div class="carousel-item active" data-interval="2000">
        <img src="https://via.placeholder.com/800x400/007bff/ffffff?text=Slide+1">
        <div class="carousel-caption">
          <h3>Slide 1</h3>
          <p>First slide description</p>
        </div>
      </div>

      <div class="carousel-item" data-interval="3000">
        <img src="https://via.placeholder.com/800x400/28a745/ffffff?text=Slide+2">
        <div class="carousel-caption">
          <h3>Slide 2</h3>
          <p>Second slide description</p>
        </div>
      </div>

      <div class="carousel-item" data-interval="4000">
        <img src="https://via.placeholder.com/800x400/dc3545/ffffff?text=Slide+3">
        <div class="carousel-caption">
          <h3>Slide 3</h3>
          <p>Third slide description</p>
        </div>
      </div>

    </div>

    <!-- Controls -->
    <a class="carousel-control-prev" href="#myCarousel" data-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </a>

    <a class="carousel-control-next" href="#myCarousel" data-slide="next">
      <span class="carousel-control-next-icon"></span>
    </a>

  </div>

</div>

</body>
</html>
